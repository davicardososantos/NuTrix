name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main  # O deploy será executado quando fizer push na branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar SSH
        run: |
            mkdir -p ~/.ssh
            echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan -H ${{ secrets.HOSTINGER_IP }} >> ~/.ssh/known_hosts

      - name: Subir arquivos para o servidor
        run: |
            rsync -avz ./ root@${{ secrets.HOSTINGER_IP }}:/root/nutrix/
      - name: Rodar migrations no servidor
        run: |
            ssh root@${{ secrets.HOSTINGER_IP }} << 'EOF'
              cd /root/nutrix/src
              docker-compose exec -T app php artisan migrate --force
              docker-compose exec app chown -R www-data:www-data storage bootstrap/cache
              docker-compose exec app chmod -R 775 storage bootstrap/cache
              docker-compose restart
            EOF